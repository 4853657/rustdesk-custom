name: Build Custom RustDesk with Pre-configured Server

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-2022
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          override: true
          components: rustfmt

      - name: Install vcpkg
        run: |
          git clone --branch 2023.04.15 --depth=1 https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: |
          C:\vcpkg\vcpkg install

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Build RustDesk
        run: |
          flutter\build.ps1 --flutter
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: flutter/build/windows/x64/runner/Release/

  build-macos-x86:
    name: Build macOS x86_64
    runs-on: macos-13
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: "1.81"
          override: true

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install dependencies
        run: |
          brew install nasm yasm

      - name: Install vcpkg
        run: |
          git clone --branch 2023.04.15 --depth=1 https://github.com/microsoft/vcpkg.git ~/vcpkg
          ~/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Install vcpkg dependencies
        run: |
          $VCPKG_ROOT/vcpkg install

      - name: Build RustDesk
        run: |
          cd flutter
          flutter build macos --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-macos-x86_64
          path: flutter/build/macos/Build/Products/Release/

  build-macos-arm:
    name: Build macOS ARM64
    runs-on: macos-14
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: "1.81"
          override: true

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install dependencies
        run: |
          brew install nasm yasm

      - name: Install vcpkg
        run: |
          git clone --branch 2023.04.15 --depth=1 https://github.com/microsoft/vcpkg.git ~/vcpkg
          ~/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Install vcpkg dependencies
        run: |
          $VCPKG_ROOT/vcpkg install

      - name: Build RustDesk
        run: |
          cd flutter
          flutter build macos --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-macos-arm64
          path: flutter/build/macos/Build/Products/Release/

  create-release:
    name: Create Release
    needs: [build-windows, build-macos-x86, build-macos-arm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create ZIP archives
        run: |
          cd artifacts
          zip -r rustdesk-windows-x64.zip rustdesk-windows-x64/
          zip -r rustdesk-macos-x86_64.zip rustdesk-macos-x86_64/
          zip -r rustdesk-macos-arm64.zip rustdesk-macos-arm64/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/rustdesk-windows-x64.zip
            artifacts/rustdesk-macos-x86_64.zip
            artifacts/rustdesk-macos-arm64.zip
          body: |
            Custom RustDesk with pre-configured server: rustdesk.hbspider.cn
            
            Server Configuration:
            - ID Server: rustdesk.hbspider.cn:21116
            - Relay Server: rustdesk.hbspider.cn:21117
            - Key: C3SQejCZTUvfDzLvvYPBR+k1TwCABFQ1AqFywSG1TN0=
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
